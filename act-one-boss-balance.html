<div id="act-one-boss-balance" class="balance-chart">
  <style>
    #act-one-boss-balance {
      color: var(--foreground);
      width: 100%;
    }
    #act-one-boss-balance .chart-wrap {
      display: grid;
      gap: 14px;
    }
    #act-one-boss-balance .plot {
      width: 100%;
      min-height: 250px;
    }
    #act-one-boss-balance .axis,
    #act-one-boss-balance .grid {
      stroke: var(--border);
      stroke-width: 1;
    }
    #act-one-boss-balance .bar {
      fill: color-mix(in srgb, var(--viz-series-1) 72%, transparent);
    }
    #act-one-boss-balance .target {
      stroke: var(--viz-series-2);
      stroke-width: 2;
      stroke-dasharray: 5 4;
    }
    #act-one-boss-balance .label,
    #act-one-boss-balance .value,
    #act-one-boss-balance .tick {
      fill: var(--foreground);
      font-size: var(--font-size-base);
      font-weight: 400;
    }
    #act-one-boss-balance .tick,
    #act-one-boss-balance .note,
    #act-one-boss-balance .legend {
      fill: var(--muted-foreground);
    }
    #act-one-boss-balance .value {
      font-weight: 500;
    }
    #act-one-boss-balance .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    #act-one-boss-balance .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted-foreground);
    }
    #act-one-boss-balance .swatch {
      width: 18px;
      height: 10px;
      border-radius: 2px;
      background: color-mix(in srgb, var(--viz-series-1) 72%, transparent);
    }
    #act-one-boss-balance .line-swatch {
      width: 22px;
      border-top: 2px dashed var(--viz-series-2);
    }
  </style>

  <div class="chart-wrap">
    <svg class="plot" viewBox="0 0 720 270" role="img" aria-labelledby="act-one-title act-one-desc">
      <title id="act-one-title">Act 1 boss death rates from latest 500-run simulation</title>
      <desc id="act-one-desc">Horizontal bar chart comparing Giant Skeleton at 23.7 percent, Goblin King at 17.8 percent, Spider Queen at 14.1 percent, and a 16 percent target line.</desc>

      <line class="grid" x1="190" y1="28" x2="190" y2="218"></line>
      <line class="grid" x1="315" y1="28" x2="315" y2="218"></line>
      <line class="grid" x1="440" y1="28" x2="440" y2="218"></line>
      <line class="grid" x1="565" y1="28" x2="565" y2="218"></line>
      <line class="target" x1="390" y1="18" x2="390" y2="224"></line>

      <text class="tick" x="190" y="246" text-anchor="middle">0%</text>
      <text class="tick" x="315" y="246" text-anchor="middle">10%</text>
      <text class="tick" x="440" y="246" text-anchor="middle">20%</text>
      <text class="tick" x="565" y="246" text-anchor="middle">30%</text>
      <text class="tick" x="390" y="14" text-anchor="middle">16% target</text>

      <text class="label" x="24" y="67">Giant Skeleton</text>
      <rect class="bar" x="190" y="42" width="296.25" height="34" rx="3"></rect>
      <text class="value" x="498" y="65">23.7%</text>

      <text class="label" x="24" y="127">Goblin King</text>
      <rect class="bar" x="190" y="102" width="222.5" height="34" rx="3"></rect>
      <text class="value" x="424" y="125">17.8%</text>

      <text class="label" x="24" y="187">Spider Queen</text>
      <rect class="bar" x="190" y="162" width="176.25" height="34" rx="3"></rect>
      <text class="value" x="378" y="185">14.1%</text>
    </svg>

    <div class="legend-row text-small" aria-label="Chart legend">
      <span class="legend-item"><span class="swatch"></span>Boss death rate</span>
      <span class="legend-item"><span class="line-swatch"></span>Approximate target</span>
      <span class="legend-item">Latest sample: 500 runs</span>
    </div>
  </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Card Crawler</title>
    <!-- Phaser as a plain UMD script. Previously this file used an
         esm.sh-wrapped Phaser ESM build whose source had
         `import __Process$ from "/node/process.mjs"` — a host-root
         import that 403s on itch.io's CDN, leaving Phaser undefined
         and the game stuck on a black screen. The standalone UMD
         build below is self-contained and sets window.Phaser. -->
    <script src="vendor/phaser-3.70.0.min.js"></script>
    <style>
        @font-face {
            font-family: "HoMM Pixel";
            src: url("assets/fonts/Able5.ttf") format("truetype");
            font-display: block;
        }

        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            font-family: "HoMM Pixel", Arial, Helvetica, sans-serif;
            overflow: hidden;
        }
        #phaser-game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <div id="phaser-game-container"></div>
    <script type="module" src="main.js?debugv=3"></script>
</body>
</html>
